  });
  node.addEventListener('mousemove',e=>{
    const wr=document.querySelector('.mw').getBoundingClientRect();
    let lx=e.clientX-wr.left+14,ly=e.clientY-wr.top+14;
    if(lx+220>wr.width)lx-=240;
    tip.style.left=lx+'px';tip.style.top=ly+'px';
  });

    if(sel!==a.id){circ.setAttribute('fill-opacity','0.18');circ.setAttribute('stroke-width','1.5');}
    tip.style.display='none';
  });
  node.addEventListener('click',()=>{
    g.querySelectorAll('circle').forEach(c=>{c.setAttribute('fill-opacity','0.18');c.setAttribute('stroke-width','1.5');});
    sel=a.id;circ.setAttribute('fill-opacity','0.42');circ.setAttribute('stroke-width','3');
