      { l:'發聲', v: a.voice,     c:'#0F6E56' },
      { l:'穩定', v: a.stability, c:'#1D9E75' },

    ).join('');
    card.innerHTML = `
      <div style="position:absolute;top:10px;right:10px;font-size:9px;padding:2px 7px;border-radius:10px;background:${rColor}18;color:${rColor};font-weight:500;">${a.region}</div>

      <div class="tags">${tagHtml}</div>
      <div class="importance-bar">${barHtml}</div>
    `;
    card.onclick = () => openDetail(a);
    grid.appendChild(card);
  });
}

function filter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const colors = { all:'#888780', geo:'#185FA5', voice:'#0F6E56', ocean:'#378ADD', religion:'#533AB7', demo:'#3B6D11', aid:'#BA7517' };
  btn.style.background = colors[cat] || '#888780';
  buildCards(cat);
}

function openDetail(a) {
  document.getElementById('d-flag').textContent = a.flag;
  document.getElementById('d-name').textContent = a.name;
  document.getElementById('d-en').textContent = a.en + '　' + a.region;
  document.getElementById('d-badge').innerHTML = `<span class="key-badge">核心價值：${a.key}</span>`;
  document.getElementById('d-value').textContent = a.value;
  document.getElementById('d-tags').innerHTML = a.tags.map(t => `<span class="tag" style="background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);font-size:11px;padding:3px 9px;">${t}</span>`).join('');
  document.getElementById('d-levels').textContent = a.levels;
  document.getElementById('detail').classList.add('open');
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('detail')) {
    document.getElementById('detail').classList.remove('open');
  }
}

buildCards('all');
</script>
