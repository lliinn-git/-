   yd:[
     {l:'抵禦中國誘引',s:28,m:40,c:'#0F6E56',r:'無公開接觸北京記錄，國王恩史瓦帝三世迄今維持親台立場。絕對君主制使其能有效抵禦外部輿論壓力（無需面對選票壓力或議會辯論）。但非洲聯盟的整體親北京環境形成持續的同儕壓力。',nt:'28/40：無接觸記錄，絕對君主制減少外部輿論壓力'},
     {l:'政黨輪替外交風險',s:32,m:35,c:'#1D9E75',r:'絕對君主制，不存在政黨，沒有選舉，理論上外交取向完全由國王個人決定，不存在政黨輪替風險。但這同時意味著外交穩定完全依賴國王個人意志——若國王更替或改變立場，沒有任何制度性機制能夠阻止外交急轉彎。「零政黨風險」背後是「個體決策高度集中」的另一種風險。',nt:'32/35：零政黨輪替風險，但個體決策風險轉移到「國王更替」上'},
     {l:'對台援助依存',s:13,m:25,c:'#5DCAA5',r:'台灣在史瓦帝尼有紡織業投資，援助計畫包括農業、醫療等，但整體在地化深度不如加勒比邦交國，援助佔GDP比重相對有限。',nt:'13/25：援助存在但深度有限，紡織業投資是主要經濟聯繫'},
   ],
   nt:'史瓦帝尼的核心矛盾：絕對君主制同時是最大的穩定因素（無政黨輪替）和最大的不確定性（外交完全取決於國王個人）。「個體決策層次高度集中」的典型案例，值得在報告QA環節主動提出。'},
];
const RC={va:'#533AB7',py:'#185FA5',gt:'#185FA5',pw:'#1D9E75',mh:'#1D9E75',bz:'#185FA5',ht:'#185FA5',kn:'#185FA5',lc:'#185FA5',vc:'#185FA5',tv:'#1D9E75',sz:'#BA7517'};
const QC={'核心盟友':'#185FA5','穩固支柱':'#1D9E75','觀察名單':'#533AB7','高風險警戒':'#C04828'};
const QB={'核心盟友':'#E6F1FB','穩固支柱':'#E1F5EE','觀察名單':'#EAD1DC','高風險警戒':'#FCE4D6'};

const nav=document.getElementById('nav');
const panels=document.getElementById('panels');

D.forEach(d=>{
  const nb=document.createElement('button');
  nb.className='nb'; nb.id='nb'+d.id;
  const star=d.updated?'★ ':'';
  nb.innerHTML=`<div style="font-size:22px;margin-bottom:3px;">${d.f}</div><div style="font-size:11px;">${star}${d.n.replace('（教廷）','').replace('及格瑞那丁','').substring(0,7)}</div>`;
  nb.onclick=()=>show(d.id);
  nav.appendChild(nb);

  const col=RC[d.id];
  const qc=QC[d.q],qb=QB[d.q];

  let xBars=d.xd.map((s,i)=>{
    const p=Math.round(s.s/s.m*100);
    const uid=d.id+'x'+i;
    return `<div class="srow">
      <div class="shdr" onclick="tog('${uid}')">
        <span class="sn">${s.l}</span>
        <span class="ss" style="color:${s.c};">${s.s} / ${s.m}</span>
        <div class="bw"><div class="bt"><div class="bf" style="width:${p}%;background:${s.c};"></div></div><span class="bm">佔${s.m}分</span></div>
      </div>
      <div class="sbody" id="${uid}">
        <div class="sr">${s.r}</div>
        <div class="snt">${s.nt}</div>
      </div>
    </div>`;
  }).join('');

  let yBars=d.yd.map((s,i)=>{
    const p=Math.round(s.s/s.m*100);
    const uid=d.id+'y'+i;
    const upd=s.updated?'updated':'';
    return `<div class="srow">
      <div class="shdr ${upd}" onclick="tog('${uid}')">
        <span class="sn">${s.l}</span>
        <span class="ss" style="color:${s.c};">${s.s} / ${s.m}</span>
        <div class="bw"><div class="bt"><div class="bf" style="width:${p}%;background:${s.c};"></div></div><span class="bm">佔${s.m}分</span></div>
      </div>
      <div class="sbody ${upd}" id="${uid}">
        <div class="sr">${s.r}</div>
        <div class="snt">${s.nt}</div>
      </div>
    </div>`;
  }).join('');

  const div=document.createElement('div');
  div.className='panel'; div.id='p'+d.id;
  div.innerHTML=`
    <div class="ph">
      <div class="pf">${d.f}</div>
      <div>
        <div class="pn">${d.n}</div>
        <div class="pen">${d.e}</div>
        <span class="badge" style="background:${qb};color:${qc};">${d.q}</span>
        ${d.updated?'<span class="badge" style="background:#e8f5e9;color:#2e7d32;margin-left:4px;">★ 本次更新</span>':''}
      </div>
      <div class="psc">
        <div class="psb"><div class="psl">對台重要性</div><div class="psv" style="color:#185FA5;">${d.xi}</div></div>
        <div class="psb"><div class="psl">邦交穩定性</div><div class="psv" style="color:#0F6E56;">${d.yi}</div></div>
      </div>
    </div>
    <div class="ax">
      <div class="ax-t" style="background:#eef5fc;color:#185FA5;">🌐 對台灣的重要性指標（總分 ${d.xi} / 100）</div>
      ${xBars}
    </div>
    <div class="ax">
      <div class="ax-t" style="background:#edfaf4;color:#0F6E56;">🔒 邦交穩定性指標（總分 ${d.yi} / 100）</div>
      ${yBars}
    </div>
    ${d.nt?`<div class="note ${d.updated?'updated':''}">${d.nt}</div>`:''}
  `;
  panels.appendChild(div);
});

function show(id){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('vis'));
  const btn=document.getElementById('nb'+id);
  btn.classList.add('on');
  const col=RC[id];
  btn.style.borderColor=col; btn.style.color=col;
  document.getElementById('p'+id).classList.add('vis');
}
function tog(id){const e=document.getElementById(id);if(e)e.classList.toggle('open');}
show('va');
</script>
</body>
</html>
