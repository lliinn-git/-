
<style>
.w{font-family:var(--font-sans);}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.tab{padding:7px 14px;border-radius:20px;border:1px solid var(--color-border-secondary);background:transparent;cursor:pointer;font-size:12px;color:var(--color-text-secondary);transition:all .15s;line-height:1.3;text-align:center;}
.tab:hover{background:var(--color-background-secondary);}
.tab.on{font-weight:500;color:#fff;border-color:transparent;}
.panel{display:none;}.panel.vis{display:block;}
.ax-l{font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;display:inline-block;margin-bottom:12px;}
.row{display:grid;grid-template-columns:28px 30px 1fr 48px;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;margin-bottom:4px;}
.row:nth-child(odd){background:var(--color-background-secondary);}
.rk{font-size:12px;color:var(--color-text-secondary);text-align:center;}
.rf{font-size:18px;text-align:center;}
.rn{font-size:13px;font-weight:500;color:var(--color-text-primary);}
.bw{display:flex;align-items:center;gap:5px;}
.bt{flex:1;height:7px;background:var(--color-border-tertiary);border-radius:4px;overflow:hidden;}
.bf{height:7px;border-radius:4px;}
.rs{font-size:13px;font-weight:500;text-align:right;min-width:38px;}
.note{font-size:11px;color:var(--color-text-secondary);margin-top:10px;padding:8px 12px;border-radius:8px;background:var(--color-background-secondary);border-left:3px solid var(--color-border-info);}
</style>
<div class="w">
<div class="tabs">
  <button class="tab on" style="background:#185FA5;" onclick="show(0,this,'#185FA5')">地緣戰略位置<br><small>X軸 45分</small></button>
  <button class="tab" onclick="show(1,this,'#378ADD')">國際組織發聲<br><small>X軸 35分</small></button>
  <button class="tab" onclick="show(2,this,'#85B7EB')">地區影響力體量<br><small>X軸 20分</small></button>
  <button class="tab" onclick="show(3,this,'#0F6E56')">抵禦中國誘引<br><small>Y軸 40分</small></button>
  <button class="tab" onclick="show(4,this,'#1D9E75')">政黨輪替風險<br><small>Y軸 35分</small></button>
  <button class="tab" onclick="show(5,this,'#5DCAA5')">對台援助依存<br><small>Y軸 25分</small></button>
</div>
<div id="panels"></div>
</div>
<script>
const IND=[
  {name:'地緣戰略位置',axis:'X軸',max:45,c:'#185FA5',
   note:'軍事節點、地緣楔子功能。帛琉近滿分（第一島鏈）；聖基茨與聖露西亞並列（均無戰略節點功能）。',
   rows:[{f:'🇵🇼',n:'帛琉',s:42},{f:'🇲🇭',n:'馬紹爾群島',s:33},{f:'🇵🇾',n:'巴拉圭',s:31},{f:'🇬🇹',n:'瓜地馬拉',s:28},{f:'🇭🇹',n:'海地',s:24},{f:'🇧🇿',n:'貝里斯',s:22},{f:'🇸🇿',n:'史瓦帝尼',s:21},{f:'🇹🇻',n:'吐瓦魯',s:19},{f:'🇻🇦',n:'梵蒂岡',s:15},{f:'🇻🇨',n:'聖文森及格瑞那丁',s:15},{f:'🇱🇨',n:'聖露西亞',s:13},{f:'🇰🇳',n:'聖基茨及尼維斯',s:13}]},
  {name:'國際組織發聲能力',axis:'X軸',max:35,c:'#378ADD',
   note:'UNGA、WHA等場合發聲。梵蒂岡以宗教軟實力居首；海地因國家失能幾乎無力發聲。',
   rows:[{f:'🇻🇦',n:'梵蒂岡',s:30},{f:'🇵🇾',n:'巴拉圭',s:23},{f:'🇵🇼',n:'帛琉',s:22},{f:'🇲🇭',n:'馬紹爾群島',s:22},{f:'🇬🇹',n:'瓜地馬拉',s:21},{f:'🇸🇿',n:'史瓦帝尼',s:16},{f:'🇧🇿',n:'貝里斯',s:15},{f:'🇹🇻',n:'吐瓦魯',s:15},{f:'🇱🇨',n:'聖露西亞',s:14},{f:'🇻🇨',n:'聖文森及格瑞那丁',s:13},{f:'🇰🇳',n:'聖基茨及尼維斯',s:11},{f:'🇭🇹',n:'海地',s:9}]},
  {name:'地區影響力與體量',axis:'X軸',max:20,c:'#85B7EB',
   note:'人口、領土、區域話語權。巴拉圭40.7萬平方公里遙遙領先；梵蒂岡和多數小島國近乎最低。',
   rows:[{f:'🇵🇾',n:'巴拉圭',s:17},{f:'🇬🇹',n:'瓜地馬拉',s:16},{f:'🇭🇹',n:'海地',s:13},{f:'🇧🇿',n:'貝里斯',s:11},{f:'🇸🇿',n:'史瓦帝尼',s:9},{f:'🇲🇭',n:'馬紹爾群島',s:5},{f:'🇱🇨',n:'聖露西亞',s:5},{f:'🇻🇨',n:'聖文森及格瑞那丁',s:5},{f:'🇵🇼',n:'帛琉',s:4},{f:'🇹🇻',n:'吐瓦魯',s:4},{f:'🇰🇳',n:'聖基茨及尼維斯',s:4},{f:'🇻🇦',n:'梵蒂岡',s:3}]},
  {name:'抵禦中國誘引的能力',axis:'Y軸',max:40,c:'#0F6E56',
   note:'高分代表風險低。帛琉靠自由聯合協定、巴拉圭靠意識形態各居前二；海地和聖文森因公開示好北京並列最低。',
   rows:[{f:'🇵🇼',n:'帛琉',s:36},{f:'🇵🇾',n:'巴拉圭',s:35},{f:'🇲🇭',n:'馬紹爾群島',s:32},{f:'🇻🇦',n:'梵蒂岡',s:29},{f:'🇬🇹',n:'瓜地馬拉',s:29},{f:'🇰🇳',n:'聖基茨及尼維斯',s:29},{f:'🇸🇿',n:'史瓦帝尼',s:28},{f:'🇹🇻',n:'吐瓦魯',s:28},{f:'🇧🇿',n:'貝里斯',s:27},{f:'🇱🇨',n:'聖露西亞',s:23},{f:'🇭🇹',n:'海地',s:12},{f:'🇻🇨',n:'聖文森及格瑞那丁',s:12}]},
  {name:'政黨輪替的外交風險',axis:'Y軸',max:35,c:'#1D9E75',
   note:'高分代表風險低（兩黨共識越強）。史瓦帝尼絕對君主制理論上零輪替；聖文森NDP大勝後歷史親北京立場，風險最高。★貝里斯更新29分、聖基茨更新30分（查有具體跨黨議會紀錄）',
   rows:[{f:'🇸🇿',n:'史瓦帝尼',s:32},{f:'🇵🇼',n:'帛琉',s:31},{f:'🇰🇳',n:'聖基茨及尼維斯 ★',s:30},{f:'🇵🇾',n:'巴拉圭',s:29},{f:'🇧🇿',n:'貝里斯 ★',s:29},{f:'🇲🇭',n:'馬紹爾群島',s:28},{f:'🇹🇻',n:'吐瓦魯',s:27},{f:'🇻🇦',n:'梵蒂岡',s:27},{f:'🇬🇹',n:'瓜地馬拉',s:27},{f:'🇱🇨',n:'聖露西亞',s:18},{f:'🇭🇹',n:'海地',s:10},{f:'🇻🇨',n:'聖文森及格瑞那丁',s:8}]},
  {name:'對台灣援助的依存程度',axis:'Y軸',max:25,c:'#5DCAA5',
   note:'台灣援助在地化深度與依賴強度。海地因台灣是「唯一裝備供應國」居首；梵蒂岡雙邊幾乎無援助關係墊底。',
   rows:[{f:'🇭🇹',n:'海地',s:20},{f:'🇵🇼',n:'帛琉',s:19},{f:'🇱🇨',n:'聖露西亞',s:18},{f:'🇹🇻',n:'吐瓦魯',s:18},{f:'🇲🇭',n:'馬紹爾群島',s:16},{f:'🇧🇿',n:'貝里斯',s:16},{f:'🇰🇳',n:'聖基茨及尼維斯',s:16},{f:'🇻🇨',n:'聖文森及格瑞那丁',s:16},{f:'🇸🇿',n:'史瓦帝尼',s:13},{f:'🇵🇾',n:'巴拉圭',s:9},{f:'🇬🇹',n:'瓜地馬拉',s:9},{f:'🇻🇦',n:'梵蒂岡',s:5}]},
];
const panels=document.getElementById('panels');
IND.forEach((ind,pi)=>{
  const div=document.createElement('div');
  div.className='panel'+(pi===0?' vis':'');
  div.id='p'+pi;
  let html=`<div class="ax-l" style="background:${ind.c}22;color:${ind.c};">${ind.axis}　${ind.name}　（滿分 ${ind.max} 分）</div>`;
  ind.rows.forEach((r,i)=>{
    const pct=Math.round(r.s/ind.max*100);
    const rk=i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    html+=`<div class="row"><div class="rk">${rk}</div><div class="rf">${r.f}</div><div><div class="rn">${r.n}</div><div class="bw"><div class="bt"><div class="bf" style="width:${pct}%;background:${ind.c};"></div></div></div></div><div class="rs" style="color:${ind.c};">${r.s}<span style="font-size:10px;color:var(--color-text-secondary);">/${ind.max}</span></div></div>`;
  });
  html+=`<div class="note">${ind.note}</div>`;
  div.innerHTML=html;
  panels.appendChild(div);
});
function show(idx,btn,col){
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('on');t.style.background='';});
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('vis'));
  btn.classList.add('on');btn.style.background=col;
  document.getElementById('p'+idx).classList.add('vis');
}
</script>
